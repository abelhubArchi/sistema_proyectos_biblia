  <p/><div class="heading"> Verso 1</div>
  <div class="lyrics">/Jamuy Dios kay sonqosniykuman./</div>
  <div class="lyrics">/Kallpata qoway, munakuytapis;</div>
  <div class="lyrics">Qhatisqaykitaj, tukuy sonqowan./</div>
  <div class="lyrics"></div>
  <p/><div class="heading"> Verso 2</div>
  <div class="lyrics">/Oh Diosniy, Qan Yanapariway./</div>
  <div class="lyrics">/Jucha saqeyta ni atiymanchu;</div>
  <div class="lyrics">Atiykiykiwan Qan yanapariway./</div>
