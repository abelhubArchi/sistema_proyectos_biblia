<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Control - Proyección de Cánticos</title>
  <link rel="stylesheet" href="/assets/fonts/fonts.css">
  <style>
    /* Premium CSS Variables for Styling */
    :root {
      --bg-main: #0a0d16;
      --bg-card: rgba(18, 24, 41, 0.7);
      --bg-card-hover: rgba(28, 37, 61, 0.85);
      --bg-active: rgba(99, 102, 241, 0.15);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-active: rgba(99, 102, 241, 0.4);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --gold: #e2c475;
      --danger: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top Navigation Header */
    header {
      background: rgba(10, 13, 22, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .header-title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-title span {
      background: linear-gradient(135deg, var(--gold) 0%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 12px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    .status-badge.disconnected {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: currentColor;
    }

    /* Main Container Grid */
    .main-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      height: calc(100vh - 65px);
      overflow: hidden;
    }

    /* Sidebar - Search and List */
    .sidebar {
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      background: rgba(8, 10, 18, 0.95);
      overflow: hidden;
    }

    .search-container {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      background: rgba(255, 255, 255, 0.08);
    }

    .song-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Elegant Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Song Card Styles */
    .song-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .song-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .song-card.active {
      border-color: var(--border-active);
      background: var(--bg-active);
    }

    .song-card-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .song-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .tone-badge {
      background: rgba(226, 196, 117, 0.1);
      border: 1px solid rgba(226, 196, 117, 0.2);
      color: var(--gold);
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 500;
    }

    /* Detail / Control Area */
    .control-area {
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(10, 13, 22, 0.6) 0%, rgba(6, 8, 14, 0.9) 100%);
      padding: 24px;
      gap: 24px;
      height: 100%;
    }

    .song-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 16px;
    }

    .song-title-group h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
    }

    .song-title-group p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* Split layout inside detail area */
    .control-workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      overflow: hidden;
      height: 100%;
    }

    /* List of verses for selection */
    .verses-list-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .verse-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    .verse-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .verse-card.selected {
      border-color: var(--border-active);
      background: rgba(99, 102, 241, 0.08);
    }

    .verse-card.projected {
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.06);
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.1);
    }

    .verse-number {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .verse-card.projected .verse-number {
      color: var(--danger);
    }

    .live-indicator {
      display: none;
      font-size: 0.7rem;
      font-weight: 700;
      color: #ffffff;
      background: var(--danger);
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      animation: pulse-live 1.5s infinite alternate;
    }

    .verse-card.projected .live-indicator {
      display: inline-block;
    }

    @keyframes pulse-live {
      0% {
        opacity: 0.6;
      }

      100% {
        opacity: 1;
      }
    }

    .verse-content {
      font-size: 1.05rem;
      line-height: 1.5;
      white-space: pre-line;
      color: var(--text-main);
    }

    /* Live Preview Screen simulation */
    .preview-pane {
      background: rgba(5, 7, 13, 0.9);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      height: 100%;
    }

    .preview-pane.live-active {
      border-color: var(--danger);
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.15);
    }

    .preview-header {
      background: rgba(255, 255, 255, 0.02);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .preview-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
      background: radial-gradient(circle at center, rgba(16, 24, 48, 0.8) 0%, rgba(5, 7, 13, 1) 100%);
      position: relative;
    }

    .preview-song-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: var(--gold);
      letter-spacing: 2px;
      position: absolute;
      top: 24px;
    }

    .preview-lyrics {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.5rem;
      line-height: 1.6;
      color: #ffffff;
      max-width: 90%;
      word-wrap: break-word;
    }

    .preview-indicator {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      position: absolute;
      bottom: 24px;
    }

    /* Button Controls footer */
    .control-actions {
      border-top: 1px solid var(--border-color);
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .control-buttons-left {
      display: flex;
      gap: 12px;
    }

    .btn {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border-color);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-live {
      background: var(--danger);
      color: #ffffff;
      padding: 12px 32px;
      font-size: 1rem;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
    }

    .btn-live:hover {
      background: #dc2626;
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
      transform: translateY(-1px);
    }

    .shortcuts-help {
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .key-badge {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border-color);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      color: #ffffff;
    }

    /* Initial state empty view */
    .empty-state {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      gap: 16px;
      grid-row: span 3;
    }

    .empty-state-icon {
      font-size: 3rem;
      opacity: 0.3;
    }

    /* Mobile Responsive View Toggle & Styles */
    @media (max-width: 768px) {
      body.view-list .control-area {
        display: none !important;
      }

      body.view-control .sidebar {
        display: none !important;
      }

      body.view-list .sidebar {
        display: flex !important;
        height: calc(100vh - 65px) !important;
        border-bottom: none !important;
      }

      body.view-control .control-area {
        display: grid !important;
        height: calc(100vh - 65px) !important;
        grid-template-rows: auto 1fr auto !important;
        padding: 16px;
        gap: 16px;
      }

      .main-layout {
        grid-template-columns: 1fr;
        height: calc(100vh - 65px);
      }

      /* Hide preview pane completely on mobile */
      .preview-pane {
        display: none !important;
      }

      /* Control workspace becomes single column */
      .control-workspace {
        grid-template-columns: 1fr !important;
        height: 100% !important;
        gap: 0;
        overflow: hidden !important;
      }

      /* Verses list gets full height and scroll */
      .verses-list-container {
        height: 100% !important;
        overflow-y: auto !important;
        padding-right: 0 !important;
        padding-bottom: 80px !important;
        /* Space for sticky footer */
      }

      /* Large easy-to-tap cards on mobile */
      .verse-card {
        padding: 20px 16px !important;
        margin-bottom: 12px !important;
        border-radius: 12px !important;
        background: rgba(255, 255, 255, 0.03);
      }

      .verses-list-container .verse-card:last-child,
      .verses-list-container .line-card:last-child {
        margin-bottom: 140px !important;
      }

      .verse-content {
        font-size: 1.15rem !important;
        line-height: 1.5;
      }

      /* Sticky mobile control bar at bottom */
      .control-actions {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #0d111d;
        border-top: 1px solid var(--border-active);
        padding: 12px 16px !important;
        display: grid !important;
        grid-template-columns: 1fr 1fr 1.2fr;
        gap: 8px;
        z-index: 100;
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
      }

      .control-buttons-left {
        display: contents !important;
        /* Flatten buttons into grid */
      }

      .control-actions .btn {
        width: 100% !important;
        height: 48px !important;
        padding: 0 !important;
        font-size: 0.85rem !important;
        border-radius: 8px !important;
        justify-content: center;
      }

      .btn-live {
        padding: 0 !important;
        font-size: 0.9rem !important;
        box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3) !important;
      }

      .shortcuts-help {
        display: none;
        /* Hide keyboard shortcuts on mobile */
      }

      .song-title-group h1 {
        font-size: 1.3rem;
      }

      header {
        padding: 12px 16px;
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
      }

      .header-actions {
        justify-content: center;
      }

      .header-actions .btn {
        padding: 6px 8px !important;
        font-size: 0.75rem !important;
        height: auto !important;
        flex: 1;
        justify-content: center;
      }

      .header-title span {
        font-size: 1rem;
      }
    }

    /* Back button and header utilities */
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-back-mobile {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-back-mobile:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--border-active);
    }

    @media (max-width: 768px) {
      .btn-back-mobile {
        display: flex;
      }

      .header-title svg {
        display: none;
        /* Hide icon on mobile header to save space */
      }
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* Modal Styles for Background Selection */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #0f1322;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      animation: modalSlide 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes modalSlide {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .modal-header h2 {
      font-size: 1.15rem;
      color: #ffffff;
      font-weight: 600;
    }

    .close-modal {
      color: var(--text-muted);
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    .close-modal:hover {
      color: #ffffff;
    }

    .fondos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 6px;
      margin-bottom: 8px;
    }

    .fondo-item {
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.05);
      aspect-ratio: 16/9;
      position: relative;
      background-size: cover;
      background-position: center;
      transition: all 0.2s;
    }

    .fondo-item:hover {
      transform: scale(1.03);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .fondo-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
    }

    .fondo-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 0.65rem;
      padding: 2px 4px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Badge de tipo coro en tarjetas de estrofa */
    .verse-card.coro-card {
      border-color: rgba(226, 196, 117, 0.35);
      background: rgba(226, 196, 117, 0.06);
    }

    .verse-card.coro-card .verse-number {
      color: var(--gold);
    }

    .coro-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 8px;
      background: rgba(226, 196, 117, 0.15);
      border: 1px solid rgba(226, 196, 117, 0.4);
      color: var(--gold);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Tabs de himnario */
    .himnario-tabs {
      display: flex;
      gap: 6px;
      padding: 14px 20px 0;
      border-bottom: 1px solid var(--border-color);
      flex-wrap: wrap;
    }

    .himnario-tab {
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 7px 13px;
      border-radius: 8px 8px 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      bottom: -1px;
    }

    .himnario-tab.active {
      background: var(--bg-card);
      border-color: var(--border-color);
      border-bottom-color: var(--bg-main);
      color: var(--text-main);
    }

    .himnario-tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
    }

    /* Indicador de numero de himno */
    .numero-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.25);
      color: var(--accent);
      margin-right: 6px;
    }

    /* ── SISTEMA DE LÍNEAS ── */
    .mode-tabs {
      height: 100px;
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .mode-tab {
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .mode-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .mode-tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
    }

    /* Contenedor de líneas */
    .lines-list-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .line-card {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 10px 12px;
      transition: all 0.2s ease;
    }

    .line-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .line-card.selected {
      border-color: var(--border-active);
      background: rgba(99, 102, 241, 0.06);
    }

    .line-card.projected {
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.06);
    }

    /* Checkbox personalizado */
    .line-check {
      width: 18px;
      height: 18px;
      min-width: 18px;
      margin-top: 2px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .line-number-badge {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      min-width: 50px;
      padding-top: 2px;
    }

    .line-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.4;
      color: var(--text-main);
    }

    .line-text-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border-active);
      border-radius: 6px;
      padding: 4px 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      width: 100%;
    }

    .line-text-input:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
    }

    .line-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .btn-line-action {
      background: none;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .btn-line-action:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
    }

    .btn-line-action.danger:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
    }

    /* Botón agregar línea */
    .btn-add-line {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: var(--text-muted);
      padding: 10px 14px;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
    }

    .btn-add-line:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(99, 102, 241, 0.06);
    }

    /* Badge de override */
    .override-badge {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 8px;
      background: rgba(226, 196, 117, 0.12);
      border: 1px solid rgba(226, 196, 117, 0.25);
      color: var(--gold);
      font-weight: 600;
      margin-left: 6px;
    }

    /* Guardar estado visual */
    .save-status {
      font-size: 0.75rem;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .save-status.visible {
      opacity: 1;
    }
  </style>
</head>

<body class="view-list">

  <!-- Top Navigation Header -->

    <div class="header-left">

          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21a9 9 0 0 1 0-18v18z"></path>
          <path d="M12 3a9 9 0 0 1 9 9h-9V3z"></path>
          <path d="M12 12a9 9 0 0 1-9 9v-9h9z"></path>
        </svg>
        <span>CONTROL DE ALABANZAS</span>

    <div class="header-actions">

        style="padding: 8px 12px; font-size: 0.8rem; height: auto; background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #ef4444;"
        onclick="terminarCanto()">

        onclick="irABuscador()">

      <div id="connection-status" class="status-badge">
        <div class="status-dot"></div>

  <!-- Main Grid Layout -->
  <div class="main-layout">

    <!-- Sidebar for search and selection -->
    <div class="sidebar">

        <button class="himnario-tab" data-fuente="cala" onclick="cambiarFuente('cala')">📖 Himnario Cala</button>
        <button class="himnario-tab" data-fuente="iglesiadedios" onclick="cambiarFuente('iglesiadedios')">⛪ Iglesia de
          Dios</button>

          autocomplete="off">

        <!-- Songs dynamically loaded here -->

    <!-- Right Control Pane -->

      <!-- Empty state initially -->

        <h2>No se ha seleccionado ningún cántico</h2>

  <!-- Modal para Cambiar Fondo -->
  <div id="fondo-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Seleccionar Fondo de Proyección</h2>

      </div>
      <div id="fondos-grid" class="fondos-grid">
        <!-- Fondos dinámicos cargados aquí -->

      <!-- Colores animados también en el modal de fondos -->
      <div style="margin-top:12px; border-top:1px solid var(--border-color); padding-top:12px;">
        <div
          style="font-size:0.75rem; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">
          Colores Animados</div>
        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;">
          <div onclick="seleccionarFondo('gradient:aurora')"
            style="height:50px;border-radius:8px;cursor:pointer;border:2px solid rgba(255,255,255,0.1);background:linear-gradient(135deg,#0A2E36,#1C0A35,#0A1C35,#0f2c1f);background-size:400% 400%;animation:modalGrad 6s ease infinite;display:flex;align-items:flex-end;padding:4px;"
            title="Aurora">
            <span style="font-size:0.6rem;color:rgba(255,255,255,0.7);width:100%;text-align:center;">Aurora</span>
          </div>
          <div onclick="seleccionarFondo('gradient:atardecer')"
            style="height:50px;border-radius:8px;cursor:pointer;border:2px solid rgba(255,255,255,0.1);background:linear-gradient(135deg,#2c0f20,#360a0a,#1a0826,#3b200a);background-size:400% 400%;animation:modalGrad 6s ease infinite;display:flex;align-items:flex-end;padding:4px;"
            title="Atardecer">
            <span style="font-size:0.6rem;color:rgba(255,255,255,0.7);width:100%;text-align:center;">Atardecer</span>
          </div>
          <div onclick="seleccionarFondo('gradient:paz')"
            style="height:50px;border-radius:8px;cursor:pointer;border:2px solid rgba(255,255,255,0.1);background:linear-gradient(135deg,#09122c,#161e38,#0e273c,#1f112e);background-size:400% 400%;animation:modalGrad 6s ease infinite;display:flex;align-items:flex-end;padding:4px;"
            title="Paz">
            <span style="font-size:0.6rem;color:rgba(255,255,255,0.7);width:100%;text-align:center;">Paz</span>
          </div>
          <div onclick="seleccionarFondo('gradient:mistico')"
            style="height:50px;border-radius:8px;cursor:pointer;border:2px solid rgba(255,255,255,0.1);background:linear-gradient(135deg,#18092a,#0b1c2b,#2b0b1c,#0d091a);background-size:400% 400%;animation:modalGrad 6s ease infinite;display:flex;align-items:flex-end;padding:4px;"
            title="Místico">
            <span style="font-size:0.6rem;color:rgba(255,255,255,0.7);width:100%;text-align:center;">Místico</span>
          </div>
        </div>
      </div>
      <style>
        @keyframes modalGrad {

          0%,
          100% {
            background-position: 0% 50%
          }

          50% {
            background-position: 100% 50%
          }
        }
      </style>
    </div>
  </div>

  <!-- Load socket.io -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Initializing Sockets and states
    var socket;
    try {
      socket = io();
    } catch (e) {
      console.warn("Socket.io no disponible", e);
      socket = { emit: function () { }, on: function () { } };
    }

    // Redirigir automáticamente la pantalla de proyección a cánticos
    socket.emit("cambiar-pantalla", "/canticospantalla");

    function irABuscador() {
      socket.emit("cambiar-pantalla", "/pantalla");
      setTimeout(() => {
        window.location.href = "/";
      }, 100);
    }

    function terminarCanto() {
      socket.emit("limpiar-pantalla", { tipo: 'cantico' });
      projectedSongTitle = "";
      projectedVerseIndex = -1;
      updateProjectedUI();
    }

    var songs = [];
    var activeSong = null;
    var selectedVerseIndex = 0;
    var projectedSongTitle = "";
    var projectedVerseIndex = -1;
    var fuenteActual = 'coros'; // 'coros' | 'cala' | 'iglesiadedios'

    // Cambiar fuente/himnario
    function cambiarFuente(fuente) {
      fuenteActual = fuente;
      // Actualizar tabs
      document.querySelectorAll('.himnario-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.fuente === fuente);
      });
      // Limpiar búsqueda
      document.getElementById('search-input').value = '';
      loadSongs();
    }

    // Sockets status updates
    socket.on('connect', () => {
      const statusBadge = document.getElementById('connection-status');
      const statusText = document.getElementById('connection-text');
      statusBadge.classList.remove('disconnected');
      statusText.textContent = "Conectado a Socket.IO";
    });

    socket.on('disconnect', () => {
      const statusBadge = document.getElementById('connection-status');
      const statusText = document.getElementById('connection-text');
      statusBadge.classList.add('disconnected');
      statusText.textContent = "Desconectado";
    });

    // Listen to changes from other clients to synchronize admin state if needed
    socket.on('cambio-estrofa', (data) => {
      projectedSongTitle = data.titulo;
      projectedVerseIndex = data.estrofaActual - 1;
      updateProjectedUI();
    });

    // Load initial songs list
    async function loadSongs(query = "") {
      try {
        const response = await fetch(`/api/canticos?fuente=${encodeURIComponent(fuenteActual)}&q=${encodeURIComponent(query)}`);
        songs = await response.json();
        renderSongList();
      } catch (err) {
        console.error("Error al cargar cánticos:", err);
      }
    }

    // Render song list in sidebar
    function renderSongList() {
      const listContainer = document.getElementById('song-list');
      if (songs.length === 0) {
        listContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted)">No se encontraron cánticos</div>';
        return;
      }

      listContainer.innerHTML = songs.map((song, index) => {
        const isActive = activeSong && activeSong.titulo === song.titulo;
        const totalEstrofas = song.estrofas ? song.estrofas.length : 0;
        const numBadge = song.numero ? `<span class="numero-badge">#${song.numero}</span>` : '';
        return `
          <div class="song-card ${isActive ? 'active' : ''}" onclick="selectSong(${index})">
            <div class="song-card-title">${numBadge}${song.titulo}</div>
            <div class="song-card-meta">
              <span class="tone-badge">${song.tono || 'Sin tono'}</span>
              <span>${totalEstrofas} ${totalEstrofas === 1 ? 'sección' : 'secciones'}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // Handle search input with simple debounce
    var searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        loadSongs(e.target.value);
      }, 300);
    });

    // Select song
    function selectSong(index) {
      activeSong = songs[index];
      selectedVerseIndex = 0;
      modoActual = 'estrofas';
      lineasCantico = [];

      renderSongList();

      document.body.classList.remove('view-list');
      document.body.classList.add('view-control');

      const controlArea = document.getElementById('control-area');
      controlArea.innerHTML = `
        <div class="song-header">
          <div class="song-title-group">
            <h1>${activeSong.titulo}</h1>
            <p>${activeSong.numero ? `#${activeSong.numero} · ` : ''}Tono: ${activeSong.tono || 'No especificado'} · Secciones: ${activeSong.estrofas.length}</p>
          </div>
        </div>

        <div class="mode-tabs">
          <button class="mode-tab active" data-modo="estrofas" onclick="cambiarModo('estrofas')">Por Estrofas</button>
          <button class="mode-tab" data-modo="lineas" onclick="cambiarModo('lineas')">Por Líneas</button>
        </div>

        <div class="control-workspace">
          <div class="verses-list-container" id="verses-list">
          </div>

          <div class="preview-pane" id="preview-pane">
            <div class="preview-header">
              <span>Vista Previa (Proyector)</span>
              <span id="preview-live-badge" style="color: var(--danger); font-weight: 700; display: none;">⬤ En Vivo</span>
            </div>
            <div class="preview-screen">
              <div class="preview-song-title" id="preview-song-title">${activeSong.titulo}</div>
              <div class="preview-lyrics" id="preview-lyrics">${activeSong.estrofas[selectedVerseIndex].texto}</div>
              <div class="preview-indicator" id="preview-indicator">Sección ${selectedVerseIndex + 1} de ${activeSong.estrofas.length}</div>
            </div>
          </div>
        </div>

        <div class="control-actions">
          <div class="control-buttons-left">
            <button class="btn btn-secondary" onclick="prevVerse()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
              Anterior [←]
            </button>
            <button class="btn btn-secondary" onclick="nextVerse()">
              Siguiente [→]
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
          </div>
          <button class="btn btn-live" onclick="projectActiveVerse()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            PROYECTAR [Enter]
          </button>
          <div class="shortcuts-help">
            <span>Atajos: <span class="key-badge">←</span> Anterior</span>
            <span><span class="key-badge">→</span> Siguiente</span>
            <span><span class="key-badge">Enter</span> Proyectar</span>
          </div>
        </div>
      `;
      renderEstrofasView();
      document.getElementById('verses-list').scrollTop = 0;
      cargarLineas(activeSong.titulo);

      // Proyectar solo el título automáticamente al seleccionar
      socket.emit("cambio-estrofa", {
        titulo: activeSong.titulo,
        soloTitulo: true,
        texto: '',
        tono: activeSong.tono || ''
      });
      projectedSongTitle = activeSong.titulo;
      projectedVerseIndex = -1; // Ninguna estrofa seleccionada en vivo
      updateProjectedUI();
    }

    // Select specific verse in workspace (without projecting)
    function selectVerse(index) {
      if (!activeSong) return;
      const isAlreadySelected = (selectedVerseIndex === index);
      selectedVerseIndex = index;

      // Update selected class in DOM list
      const cards = document.querySelectorAll('.verse-card');
      cards.forEach((c, idx) => {
        if (idx === index) {
          c.classList.add('selected');
        } else {
          c.classList.remove('selected');
        }
      });

      // Update lyrics in preview
      const previewLyrics = document.getElementById('preview-lyrics');
      const previewIndicator = document.getElementById('preview-indicator');
      if (previewLyrics) previewLyrics.innerHTML = activeSong.estrofas[index].texto.replace(/\n/g, '<br>');
      if (previewIndicator) {
        const est = activeSong.estrofas[index];
        const esCoro = est.tipo === 'coro';
        previewIndicator.textContent = esCoro ? '🎶 Coro' : `Sección ${index + 1} de ${activeSong.estrofas.length}`;
      }

      // Update preview border status if selected is the projected one
      const previewPane = document.getElementById('preview-pane');
      const liveBadge = document.getElementById('preview-live-badge');
      const isProjectedActive = projectedSongTitle === activeSong.titulo && projectedVerseIndex === index;

      if (previewPane && liveBadge) {
        if (isProjectedActive) {
          previewPane.classList.add('live-active');
          liveBadge.style.display = 'inline';
        } else {
          previewPane.classList.remove('live-active');
          liveBadge.style.display = 'none';
        }
      }

      // Si se hace tap/click por segunda vez en la misma estrofa, se proyecta inmediatamente
      if (isAlreadySelected) {
        projectActiveVerse();
      }
    }

    // Project currently selected verse (original — sobrescrita por la nueva versión de arriba)
    function projectActiveVerse_UNUSED() {
      if (!activeSong) return;

      const payload = {
        titulo: activeSong.titulo,
        estrofaActual: selectedVerseIndex + 1,
        totalEstrofas: activeSong.estrofas.length,
        texto: activeSong.estrofas[selectedVerseIndex].texto
      };

      socket.emit("cambio-estrofa", payload);

      projectedSongTitle = activeSong.titulo;
      projectedVerseIndex = selectedVerseIndex;

      updateProjectedUI();
    }

    // Update the UI styling to show which verse is currently projected
    function updateProjectedUI() {
      if (!activeSong) return;

      const cards = document.querySelectorAll('.verse-card');
      cards.forEach((c, idx) => {
        const isProjected = (projectedSongTitle === activeSong.titulo && projectedVerseIndex === idx);
        if (isProjected) {
          c.classList.add('projected');
        } else {
          c.classList.remove('projected');
        }
      });

      // Update preview container class and live badge
      const previewPane = document.getElementById('preview-pane');
      const liveBadge = document.getElementById('preview-live-badge');
      if (previewPane && liveBadge) {
        const isProjectedActive = projectedSongTitle === activeSong.titulo && projectedVerseIndex === selectedVerseIndex;
        if (isProjectedActive) {
          previewPane.classList.add('live-active');
          liveBadge.style.display = 'inline';
        } else {
          previewPane.classList.remove('live-active');
          liveBadge.style.display = 'none';
        }
      }
    }

    // Navigation methods
    function nextVerse() {
      if (!activeSong) return;
      if (selectedVerseIndex < activeSong.estrofas.length - 1) {
        selectVerse(selectedVerseIndex + 1);
        scrollToSelectedVerse();
      }
    }

    function prevVerse() {
      if (!activeSong) return;
      if (selectedVerseIndex > 0) {
        selectVerse(selectedVerseIndex - 1);
        scrollToSelectedVerse();
      }
    }

    function scrollToSelectedVerse() {
      const selectedCard = document.getElementById(`verse-card-${selectedVerseIndex}`);
      if (selectedCard) {
        selectedCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    // Keyboard Shortcuts
    window.addEventListener('keydown', (e) => {
      // Ignore key events when inside search input
      if (document.activeElement === document.getElementById('search-input')) {
        if (e.key === 'Enter') {
          // If hit enter inside search, blur it and select first match
          document.getElementById('search-input').blur();
          const firstCard = document.querySelector('.song-card');
          if (firstCard) {
            firstCard.click();
          }
        }
        return;
      }

      if (!activeSong) return;

      switch (e.key) {
        case 'ArrowRight':
          e.preventDefault();
          nextVerse();
          break;
        case 'ArrowLeft':
          e.preventDefault();
          prevVerse();
          break;
        case 'Enter':
          e.preventDefault();
          projectActiveVerse();
          break;
      }
    });

    // ══════════════════════════════════════════════════════════════════
    // SISTEMA DE LÍNEAS
    // ══════════════════════════════════════════════════════════════════
    var modoActual = 'estrofas'; // 'estrofas' | 'lineas'
    var lineasCantico = [];      // Array de { id, texto, seleccionada }
    var tieneOverride = false;
    var saveTimeout = null;

    // Proyectar versículo activo (compatible con ambos modos)
    function projectActiveVerse() {
      if (!activeSong) return;

      if (modoActual === 'lineas') {
        const seleccionadas = lineasCantico.filter(l => l.seleccionada);
        if (seleccionadas.length === 0) {
          alert('No hay líneas seleccionadas para proyectar.');
          return;
        }
        const texto = seleccionadas.map(l => l.texto).join('\n');
        const payload = {
          titulo: activeSong.titulo,
          estrofaActual: 'Líneas',
          totalEstrofas: null,
          texto,
          tono: activeSong.tono || ''
        };
        socket.emit("cambio-estrofa", payload);
        projectedSongTitle = activeSong.titulo;
        projectedVerseIndex = -1;
        updateProjectedUI();
      } else {
        // Modo estrofas (original)
        const estrofa = activeSong.estrofas[selectedVerseIndex];
        const payload = {
          titulo: activeSong.titulo,
          estrofaActual: selectedVerseIndex + 1,
          totalEstrofas: activeSong.estrofas.length,
          texto: estrofa.texto,
          esCoro: estrofa.tipo === 'coro',
          fuente: activeSong.fuente || 'coros',
          tono: activeSong.tono || ''
        };
        socket.emit("cambio-estrofa", payload);
        projectedSongTitle = activeSong.titulo;
        projectedVerseIndex = selectedVerseIndex;
        updateProjectedUI();
      }
    }

    function cambiarModo(modo) {
      modoActual = modo;
      document.querySelectorAll('.mode-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.modo === modo);
      });
      if (modo === 'estrofas') {
        renderEstrofasView();
      } else {
        if (lineasCantico.length === 0) {
          cargarLineas(activeSong.titulo).then(() => renderLineasView());
        } else {
          renderLineasView();
        }
      }
    }

    async function cargarLineas(titulo) {
      try {
        const res = await fetch(`/api/canticos/${encodeURIComponent(titulo)}/lineas`);
        const data = await res.json();
        lineasCantico = data.lineas || [];
        tieneOverride = data.tieneOverride || false;
      } catch (e) {
        console.error('Error cargando líneas:', e);
        lineasCantico = [];
      }
    }

    async function guardarLineas() {
      if (!activeSong) return;
      try {
        await fetch(`/api/canticos/${encodeURIComponent(activeSong.titulo)}/lineas`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lineas: lineasCantico })
        });
        tieneOverride = true;
        mostrarSaveStatus();
      } catch (e) { console.error('Error guardando líneas:', e); }
    }

    function autoGuardar() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(guardarLineas, 800);
    }

    function mostrarSaveStatus() {
      const el = document.getElementById('save-status-lines');
      if (!el) return;
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 2500);
    }

    async function restaurarLineas() {
      if (!activeSong) return;
      if (!confirm('¿Restaurar las líneas originales del cántico? Se perderán los cambios guardados.')) return;
      try {
        const res = await fetch(`/api/canticos/${encodeURIComponent(activeSong.titulo)}/lineas`, {
          method: 'DELETE'
        });
        const data = await res.json();
        lineasCantico = data.lineas || [];
        tieneOverride = false;
        renderLineasView();
      } catch (e) { console.error('Error restaurando:', e); }
    }

    async function toggleCoro(index) {
      if (!activeSong) return;
      const estrofa = activeSong.estrofas[index];
      estrofa.tipo = estrofa.tipo === 'coro' ? 'estrofa' : 'coro';
      renderEstrofasView();
      if (selectedVerseIndex === index) {
        selectVerse(index);
      }

      // Guardar permanentemente en el backend
      const corosIndices = activeSong.estrofas
        .map((est, idx) => est.tipo === 'coro' ? idx : -1)
        .filter(idx => idx !== -1);

      try {
        await fetch(`/api/canticos/${encodeURIComponent(activeSong.titulo)}/coros`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ corosIndices })
        });
        mostrarSaveStatus(); // opcional, muestra feedback visual si existe
      } catch (err) {
        console.error("Error guardando coros:", err);
      }
    }

    function renderEstrofasView() {
      const versesListEl = document.getElementById('verses-list');
      if (!versesListEl || !activeSong) return;
      versesListEl.innerHTML = activeSong.estrofas.map((est, i) => {
        const esCoro = est.tipo === 'coro';
        return `
          <div class="verse-card ${i === selectedVerseIndex ? 'selected' : ''} ${esCoro ? 'coro-card' : ''}" id="verse-card-${i}" onclick="selectVerse(${i})">
            <div class="verse-number">
              <div style="display:flex; align-items:center; gap:8px;">
                <span>${esCoro ? '🎶 Coro' : `Estrofa ${i + 1}`}</span>
                <button class="btn btn-secondary" style="padding: 2px 6px; font-size: 0.65rem; height:auto;" onclick="event.stopPropagation(); toggleCoro(${i})">
                  ${esCoro ? 'Quitar Coro' : 'Marcar Coro'}
                </button>
              </div>
              ${esCoro ? '<span class="coro-badge">CORO</span>' : '<span class="live-indicator">EN VIVO</span>'}
            </div>
            <div class="verse-content">${est.texto}</div>
          </div>
        `;
      }).join('');
      updateProjectedUI();
    }

    function renderLineasView() {
      const versesListEl = document.getElementById('verses-list');
      if (!versesListEl || !activeSong) return;

      let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:0.78rem;color:var(--text-muted)">${lineasCantico.length} líneas</span>
          ${tieneOverride ? '<span class="override-badge">✏️ Editado</span>' : ''}
          <div class="save-status" id="save-status-lines">✓ Guardado</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          ${tieneOverride ? `<button class="btn btn-secondary" style="padding:4px 10px;font-size:0.75rem;height:auto;" onclick="restaurarLineas()">↺ Restaurar</button>` : ''}
          <button class="btn btn-secondary" style="padding:4px 10px;font-size:0.75rem;height:auto;" onclick="seleccionarTodasLineas(true)">Sel. todas</button>
          <button class="btn btn-secondary" style="padding:4px 10px;font-size:0.75rem;height:auto;" onclick="seleccionarTodasLineas(false)">Ninguna</button>
        </div>
      </div>`;

      html += lineasCantico.map((linea, i) => `
        <div class="line-card ${linea.seleccionada ? 'selected' : ''}" id="line-card-${i}">
          <input type="checkbox" class="line-check"
            ${linea.seleccionada ? 'checked' : ''}
            onchange="toggleLinea(${i}, this.checked)"
            title="Seleccionar línea">
          <span class="line-number-badge">Línea ${i + 1}</span>
          <span class="line-text" id="line-text-${i}" ondblclick="editarLinea(${i})">${linea.texto}</span>
          <div class="line-actions">
            <button class="btn-line-action" onclick="editarLinea(${i})" title="Editar">✏️</button>
            <button class="btn-line-action" onclick="agregarLineaAbajo(${i})" title="Agregar abajo">➕</button>
            <button class="btn-line-action danger" onclick="eliminarLinea(${i})" title="Eliminar">🗑️</button>
          </div>
        </div>
      `).join('');

      html += `<button class="btn-add-line" onclick="agregarLineaFinal()">➕ Agregar línea al final</button>`;

      versesListEl.innerHTML = html;
      actualizarVistaPrevia();
    }

    function toggleLinea(index, checked) {
      lineasCantico[index].seleccionada = checked;
      const card = document.getElementById(`line-card-${index}`);
      if (card) card.classList.toggle('selected', checked);
      actualizarVistaPrevia();
      autoGuardar();
    }

    function seleccionarTodasLineas(valor) {
      lineasCantico.forEach(l => l.seleccionada = valor);
      renderLineasView();
      autoGuardar();
    }

    function editarLinea(index) {
      const textEl = document.getElementById(`line-text-${index}`);
      if (!textEl) return;
      const lineaOriginal = lineasCantico[index].texto;
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'line-text-input';
      input.value = lineaOriginal;
      textEl.replaceWith(input);
      input.focus();
      input.select();

      const confirmar = () => {
        const nuevoTexto = input.value.trim() || lineaOriginal;
        lineasCantico[index].texto = nuevoTexto;
        const span = document.createElement('span');
        span.className = 'line-text';
        span.id = `line-text-${index}`;
        span.textContent = nuevoTexto;
        span.ondblclick = () => editarLinea(index);
        input.replaceWith(span);
        actualizarVistaPrevia();
        autoGuardar();
      };

      input.addEventListener('blur', confirmar);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.value = lineaOriginal; input.blur(); }
        e.stopPropagation(); // No disparar atajos de teclado globales
      });
    }

    function agregarLineaAbajo(index) {
      const nuevaLinea = { id: Date.now(), texto: 'Nueva línea', seleccionada: true };
      lineasCantico.splice(index + 1, 0, nuevaLinea);
      renderLineasView();
      autoGuardar();
      setTimeout(() => editarLinea(index + 1), 50);
    }

    function agregarLineaFinal() {
      const nuevaLinea = { id: Date.now(), texto: 'Nueva línea', seleccionada: true };
      lineasCantico.push(nuevaLinea);
      renderLineasView();
      autoGuardar();
      setTimeout(() => editarLinea(lineasCantico.length - 1), 50);
    }

    function eliminarLinea(index) {
      if (lineasCantico.length <= 1) return;
      lineasCantico.splice(index, 1);
      renderLineasView();
      autoGuardar();
    }

    function actualizarVistaPrevia() {
      const previewLyrics = document.getElementById('preview-lyrics');
      const previewIndicator = document.getElementById('preview-indicator');
      if (!previewLyrics) return;

      if (modoActual === 'lineas') {
        const seleccionadas = lineasCantico.filter(l => l.seleccionada);
        previewLyrics.innerHTML = seleccionadas.map(l => l.texto).join('<br>');
        if (previewIndicator) {
          previewIndicator.textContent = `${seleccionadas.length} de ${lineasCantico.length} líneas seleccionadas`;
        }
      }
    }

    // Métodos para cambiar de vista en móvil
    function regresarALista() {
      document.body.classList.remove('view-control');
      document.body.classList.add('view-list');
    }

    // Métodos para control de fondos
    var fondosList = [];
    var fondoActualActivo = "assets/1.jpg";

    // Escuchar el fondo inicial o cambios de fondo de otros clientes
    try {
      var socket = io();
      socket.on("cambiar-fondo", (url) => {
        fondoActualActivo = url;
        actualizarFondoActivoUI();
      });
    } catch (e) { console.error("Socket error", e); }

    async function abrirFondoModal() {
      const modal = document.getElementById('fondo-modal');
      modal.classList.add('active');

      try {
        const response = await fetch('/api/fondos');
        fondosList = await response.json();
        renderFondosGrid();
      } catch (err) {
        console.error("Error al cargar los fondos:", err);
      }
    }

    function cerrarFondoModal() {
      const modal = document.getElementById('fondo-modal');
      modal.classList.remove('active');
    }

    function renderFondosGrid() {
      const grid = document.getElementById('fondos-grid');
      if (!grid) return;

      if (fondosList.length === 0) {
        grid.innerHTML = '<div style="grid-column: span 3; text-align: center; color: var(--text-muted)">No se encontraron fondos</div>';
        return;
      }

      grid.innerHTML = fondosList.map(fondo => {
        const url = fondo.url || fondo;
        const nombre = (fondo.nombre || url.split('/').pop().split('.').shift());
        const tipo = fondo.tipo || 'imagen';
        const isActivo = (url === fondoActualActivo || ('/' + url) === fondoActualActivo || url === ('/' + fondoActualActivo));
        return `
          <div class="fondo-item ${isActivo ? 'active' : ''}" style="background-image: url('/${url}')" onclick="seleccionarFondo('${url}')">
            <div class="fondo-name">${nombre}${tipo !== 'imagen' ? ' (' + tipo + ')' : ''}</div>
          </div>
        `;
      }).join('');
    }

    function seleccionarFondo(url) {
      fondoActualActivo = '/' + url;
      socket.emit("cambiar-fondo", '/' + url);
      actualizarFondoActivoUI();
      cerrarFondoModal();
    }

    function actualizarFondoActivoUI() {
      const items = document.querySelectorAll('.fondo-item');
      items.forEach(item => {
        const bgUrl = item.style.backgroundImage.replace(/url\(['"]\/?|['"]\)/g, '');
        const normActivo = fondoActualActivo.replace(/^\//, '');
        const normBgUrl = bgUrl.replace(/^\//, '');
        if (normBgUrl === normActivo) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    }

    // Cerrar modal al hacer clic fuera del contenido
    window.addEventListener('click', (e) => {
      const modal = document.getElementById('fondo-modal');
      if (e.target === modal) {
        cerrarFondoModal();
      }
    });

    // Función para subir un fondo desde archivo
    function triggerSubirFondo() {
      document.getElementById('subir-fondo-input').click();
    }

    async function subirFondoArchivo(input) {
      const file = input.files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('fondo', file);
      try {
        const res = await fetch('/api/subir-fondo', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.exito) {
          // Recargar lista de fondos y abrir modal
          await abrirFondoModal();
          // Auto seleccionar el fondo recién subido
          seleccionarFondo(data.url);
          alert(`✅ Fondo "${data.nombre}" subido exitosamente`);
        } else {
          alert('Error al subir el fondo: ' + (data.error || 'desconocido'));
        }
      } catch (e) {
        alert('Error de red al subir el fondo.');
        console.error(e);
      }
      // Reset input para permitir subir el mismo archivo otra vez
      input.value = '';
    }

    // Run initial load
    loadSongs();
  </script>
</body>

</html>
